[recipe]
name = "PostgreSQL"
description = "Production-ready PostgreSQL database server"
icon = "postgres.svg"
category = "database"
tags = ["sql", "relational", "database"]
min_memory = "256M"
platforms = ["linux/amd64", "linux/arm64"]

# Note: config placeholder syntax ({{ config:key }}) is not yet implemented.
# db_name and db_user are hardcoded in env below. db_password uses secret syntax.
# When config placeholders land, restore recipe.config entries and wire them into env.

[recipe.config]
  [recipe.config.db_password]
  label = "Database Password"
  type = "secret"
  required = true

[service.postgres]
image = "postgres:16-alpine"
replicas = 1

  [service.postgres.env]
  POSTGRES_DB = "app"
  POSTGRES_USER = "app"
  POSTGRES_PASSWORD = "{{ secret:postgres-password }}"

  [service.postgres.health]
  type = "tcp"
  port = 5432
  interval = "15s"

  [service.postgres.ports]
  "5432" = "5432"

  [[service.postgres.volumes]]
  name = "pg-data"
  target = "/var/lib/postgresql/data"

  [service.postgres.resources]
  memory = "256M"
  cpus = 0.5
