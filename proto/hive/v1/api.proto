syntax = "proto3";

package hive.v1;

option go_package = "github.com/jalsarraf0/hive/daemon/internal/api/gen/hive/v1;hivev1";

import "hive/v1/types.proto";
import "google/protobuf/empty.proto";

// HiveAPI is the primary API exposed by hived for CLI and Console interaction.
service HiveAPI {

  // ─── Cluster ───────────────────────────────────────────────
  rpc GetClusterStatus(google.protobuf.Empty) returns (ClusterStatusResponse);

  // ─── Cluster Management ─────────────────────────────────────
  rpc InitCluster(InitClusterRequest) returns (InitClusterResponse);
  rpc JoinCluster(JoinClusterRequest) returns (JoinClusterResponse);

  // ─── Nodes ─────────────────────────────────────────────────
  rpc ListNodes(google.protobuf.Empty) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (Node);
  rpc DrainNode(DrainNodeRequest) returns (google.protobuf.Empty);

  // ─── Validation ────────────────────────────────────────────
  rpc ValidateHivefile(ValidateHivefileRequest) returns (ValidateHivefileResponse);

  // ─── Services ──────────────────────────────────────────────
  rpc DeployService(DeployServiceRequest) returns (DeployServiceResponse);
  rpc ListServices(google.protobuf.Empty) returns (ListServicesResponse);
  rpc GetService(GetServiceRequest) returns (Service);
  rpc StopService(StopServiceRequest) returns (google.protobuf.Empty);
  rpc ScaleService(ScaleServiceRequest) returns (google.protobuf.Empty);
  rpc RollbackService(RollbackServiceRequest) returns (google.protobuf.Empty);
  rpc RestartService(RestartServiceRequest) returns (google.protobuf.Empty);
  rpc UpdateService(UpdateServiceRequest) returns (google.protobuf.Empty);

  // ─── Containers ────────────────────────────────────────────
  rpc ListContainers(ListContainersRequest) returns (ListContainersResponse);
  rpc ContainerLogs(ContainerLogsRequest) returns (stream LogEntry);
  rpc ExecContainer(ExecContainerRequest) returns (ExecContainerResponse);

  // ─── Secrets ───────────────────────────────────────────────
  rpc SetSecret(SetSecretRequest) returns (google.protobuf.Empty);
  rpc ListSecrets(google.protobuf.Empty) returns (ListSecretsResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (google.protobuf.Empty);
  rpc RotateSecret(RotateSecretRequest) returns (RotateSecretResponse);

  // ─── Node Labels ──────────────────────────────────────────
  rpc SetNodeLabel(SetNodeLabelRequest) returns (google.protobuf.Empty);
  rpc RemoveNodeLabel(RemoveNodeLabelRequest) returns (google.protobuf.Empty);

  // ─── Stacks ───────────────────────────────────────────────
  rpc DeployStack(DeployStackRequest) returns (DeployServiceResponse);

  // ─── Events ────────────────────────────────────────────────
  rpc StreamEvents(google.protobuf.Empty) returns (stream Event);

  // ─── Cron ────────────────────────────────────────────────
  rpc ListCronJobs(google.protobuf.Empty) returns (ListCronJobsResponse);

  // ─── Health Timeline ──────────────────────────────────────
  rpc GetServiceHealth(GetServiceHealthRequest) returns (GetServiceHealthResponse);

  // ─── Deploy Preview ─────────────────────────────────────
  rpc DiffDeploy(DiffDeployRequest) returns (DiffDeployResponse);

  // ─── Volumes ───────────────────────────────────────────
  rpc ListVolumes(google.protobuf.Empty) returns (ListVolumesResponse);
  rpc CreateVolume(CreateVolumeRequest) returns (CreateVolumeResponse);
  rpc DeleteVolume(DeleteVolumeRequest) returns (google.protobuf.Empty);

  // ─── Backup/Restore ─────────────────────────────────────
  rpc ExportCluster(google.protobuf.Empty) returns (ExportClusterResponse);
  rpc ImportCluster(ImportClusterRequest) returns (ImportClusterResponse);
}

// ─── Cluster Management ───────────────────────────────────────

message InitClusterRequest {
  string cluster_name = 1;  // optional, defaults to "hive"
}

message InitClusterResponse {
  string cluster_id = 1;
  string node_name = 2;
  string gossip_addr = 3;
  string ca_fingerprint = 4;  // SHA-256 fingerprint of the generated cluster CA
  string join_token = 5;       // token required for new nodes to get certificates signed
  string join_code = 6;        // short human-readable code: HIVE-XXXX-XXXX
}

message JoinClusterRequest {
  repeated string seed_addrs = 1;  // gossip addresses to join
  string join_token = 2;           // cluster join token (for PKI enrollment)
}

message JoinClusterResponse {
  uint32 nodes_joined = 1;
  repeated Node nodes = 2;
}

// ─── Cluster Status ──────────────────────────────────────────

message ClusterStatusResponse {
  uint32 total_nodes = 1;
  uint32 healthy_nodes = 2;
  uint32 total_services = 3;
  uint32 running_containers = 4;
  repeated Node nodes = 5;
  repeated Event recent_events = 6;
  map<string, uint32> containers_per_node = 7;
}

// ─── Nodes ───────────────────────────────────────────────────

message ListNodesResponse {
  repeated Node nodes = 1;
}

message GetNodeRequest {
  string name = 1;
}

message DrainNodeRequest {
  string name = 1;
}

// ─── Services ────────────────────────────────────────────────

message DeployServiceRequest {
  // Raw TOML content of the Hivefile (or the service section)
  string hivefile_toml = 1;
}

message DeployServiceResponse {
  repeated Service services = 1;
}

message ListServicesResponse {
  repeated Service services = 1;
}

message GetServiceRequest {
  string name = 1;
}

message StopServiceRequest {
  string name = 1;
}

message ScaleServiceRequest {
  string name = 1;
  uint32 replicas = 2;
}

message RollbackServiceRequest {
  string name = 1;
}

message RestartServiceRequest {
  string name = 1;
}

message UpdateServiceRequest {
  string name = 1;
  string image = 2;       // new image (empty = no change)
  uint32 replicas = 3;    // new replica count (0 = no change)
  map<string, string> env = 4; // env var updates (merged into existing)
}

// ─── Containers ──────────────────────────────────────────────

message ListContainersRequest {
  string service_name = 1;  // filter by service, empty = all
  string node_name = 2;     // filter by node, empty = all
}

message ListContainersResponse {
  repeated Container containers = 1;
}

message ContainerLogsRequest {
  string container_id = 1;
  bool follow = 2;
  uint32 tail_lines = 3;
  string service_name = 4;  // alternative to container_id — looks up by service name
}

message LogEntry {
  string container_id = 1;
  string node_name = 2;
  string service_name = 3;
  string line = 4;
  string stream = 5;  // "stdout" | "stderr"
  int64 timestamp_unix = 6;
}

message ExecContainerRequest {
  string container_id = 1;
  string service_name = 2;   // alternative to container_id
  repeated string command = 3;
}

message ExecContainerResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
}

// ─── Secrets ─────────────────────────────────────────────────

message SetSecretRequest {
  string key = 1;
  bytes value = 2;
}

message ListSecretsResponse {
  repeated SecretMeta secrets = 1;
}

message SecretMeta {
  string key = 1;
  string created_by = 2;
  int64 created_at_unix = 3;
  int64 updated_at_unix = 4;
}

message DeleteSecretRequest {
  string key = 1;
}

// ─── Cron ───────────────────────────────────────────────

message CronJob {
  string name = 1;
  string schedule = 2;     // cron expression
  string service = 3;
  repeated string command = 4;
  string next_run = 5;     // RFC3339
  string last_run = 6;     // RFC3339 or empty
}

message ListCronJobsResponse {
  repeated CronJob jobs = 1;
}

// ─── Validate ─────────────────────────────────────────────

message ValidateHivefileRequest {
  string hivefile_toml = 1;
  bool server_checks = 2;  // if true, also check secrets, nodes, port conflicts
}

message ValidateHivefileResponse {
  bool valid = 1;
  repeated ValidationIssue issues = 2;
}

message ValidationIssue {
  ValidationSeverity severity = 1;
  string field = 2;       // e.g. "service.web.health.port"
  string message = 3;
  string service = 4;     // which service, empty for file-level
}

enum ValidationSeverity {
  VALIDATION_SEVERITY_UNSPECIFIED = 0;
  VALIDATION_SEVERITY_ERROR = 1;
  VALIDATION_SEVERITY_WARNING = 2;
  VALIDATION_SEVERITY_INFO = 3;
}

// ─── Bootstrap (join-code exchange) ─────────────────────────

message BootstrapRequest {
  string join_code = 1;   // short code from 'hive init' output
}

message BootstrapResponse {
  string join_token = 1;     // full cluster join token
  string gossip_addr = 2;   // gossip host:port of the init node
  bytes ca_cert_pem = 3;    // PEM-encoded cluster CA certificate
  string cluster_name = 4;  // cluster name
  int32 gossip_port = 5;    // gossip port number
}

// ─── Service Health ───────────────────────────────────────

message GetServiceHealthRequest {
  string name = 1;
  int32 limit = 2;  // max events, 0 = default (100)
}

message GetServiceHealthResponse {
  string service_name = 1;
  repeated HealthEvent events = 2;
  bool currently_healthy = 3;
  int32 consecutive_failures = 4;
}

// ─── Backup/Restore ──────────────────────────────────────────

message ExportClusterResponse {
  bytes data = 1;
  string version = 2;
}

message ImportClusterRequest {
  bytes data = 1;
  bool overwrite = 2;
}

message ImportClusterResponse {
  uint32 services_imported = 1;
  uint32 secrets_imported = 2;
}

// ─── Deploy Preview (Diff) ──────────────────────────────────

message DiffDeployRequest {
  string hivefile_toml = 1;
}

message DiffDeployResponse {
  repeated ServiceDiff diffs = 1;
}

message ServiceDiff {
  string name = 1;
  DiffAction action = 2;
  string old_image = 3;
  string new_image = 4;
  uint32 old_replicas = 5;
  uint32 new_replicas = 6;
  repeated string changes = 7;
}

enum DiffAction {
  DIFF_ACTION_UNSPECIFIED = 0;
  DIFF_ACTION_CREATE = 1;
  DIFF_ACTION_UPDATE = 2;
  DIFF_ACTION_UNCHANGED = 3;
}

// ─── Volumes ────────────────────────────────────────────────

message ListVolumesResponse {
  repeated VolumeInfo volumes = 1;
}

message VolumeInfo {
  string name = 1;
  string driver = 2;
  string mountpoint = 3;
  string created_at = 4;
}

message CreateVolumeRequest {
  string name = 1;
}

message CreateVolumeResponse {
  string name = 1;
  string mountpoint = 2;
}

message DeleteVolumeRequest {
  string name = 1;
}

// ─── Secrets Rotation ─────────────────────────────────────

message RotateSecretRequest {
  string key = 1;
  bytes new_value = 2;
}

message RotateSecretResponse {
  repeated string restarted_services = 1;
}

// ─── Node Labels ──────────────────────────────────────────

message SetNodeLabelRequest {
  string node = 1;
  string key = 2;
  string value = 3;
}

message RemoveNodeLabelRequest {
  string node = 1;
  string key = 2;
}

// ─── Stacks ─────────────────────────────────────────────

message DeployStackRequest {
  string stack_name = 1;
  repeated string hivefile_tomls = 2; // TOML content of each Hivefile
}
