name: Release

on:
  push:
    tags: ["v*"]

# NOTE: Tag pushes should only happen after CI passes on main.
# Configure branch protection to enforce this.

permissions:
  contents: write

env:
  CARGO_HOME: /tmp/hive-ci-cargo
  RUSTUP_HOME: /tmp/hive-ci-rustup
  GOPATH: /tmp/hive-ci-go
  PROTOC_VERSION: "29.3"

jobs:
  guard:
    name: Repo Guard
    uses: ./.github/workflows/repo-guard.yml

  build-daemon:
    name: Build daemon (${{ matrix.target }})
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Build
        run: |
          cd daemon && CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o ../dist/hived-${{ matrix.target }}${{ matrix.ext }} ./cmd/hived

      - uses: actions/upload-artifact@v4
        with:
          name: hived-${{ matrix.target }}
          path: dist/hived-${{ matrix.target }}*

  build-rust:
    name: Build Rust (${{ matrix.crate }}-${{ matrix.target }})
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    strategy:
      fail-fast: false
      matrix:
        include:
          - crate: cli
            binary: hive
            target: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
            use_cross: false
          - crate: tui
            binary: hivetop
            target: linux-amd64
            rust_target: x86_64-unknown-linux-gnu
            use_cross: false
          - crate: cli
            binary: hive
            target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            use_cross: true
          - crate: tui
            binary: hivetop
            target: linux-arm64
            rust_target: aarch64-unknown-linux-gnu
            use_cross: true
          - crate: cli
            binary: hive
            target: windows-amd64
            rust_target: x86_64-pc-windows-gnu
            use_cross: true
            ext: .exe
          - crate: tui
            binary: hivetop
            target: windows-amd64
            rust_target: x86_64-pc-windows-gnu
            use_cross: true
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          version: ${{ env.PROTOC_VERSION }}
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap writable rustup
        run: |
          if [ ! -f "$RUSTUP_HOME/settings.toml" ]; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain stable
          fi
          echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Add cargo bin to PATH
        run: echo "$CARGO_HOME/bin" >> "$GITHUB_PATH"

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release (native)
        if: ${{ !matrix.use_cross }}
        run: cd ${{ matrix.crate }} && cargo build --release --target ${{ matrix.rust_target }}

      - name: Build release (cross)
        if: matrix.use_cross
        run: cd ${{ matrix.crate }} && cross build --release --target ${{ matrix.rust_target }}

      - name: Package
        run: |
          mkdir -p dist
          cp ${{ matrix.crate }}/target/${{ matrix.rust_target }}/release/${{ matrix.binary }}${{ matrix.ext }} dist/${{ matrix.binary }}-${{ matrix.target }}${{ matrix.ext }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-${{ matrix.target }}
          path: dist/${{ matrix.binary }}-${{ matrix.target }}*

  release:
    name: Create GitHub Release
    needs: [build-daemon, build-rust]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Hive ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
