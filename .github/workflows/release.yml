name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-daemon:
    name: Build daemon (${{ matrix.target }})
    runs-on: [self-hosted, Linux, X64, unified-all]
    strategy:
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Build
        run: |
          cd daemon && CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o ../dist/hived-${{ matrix.target }}${{ matrix.ext }} ./cmd/hived

      - uses: actions/upload-artifact@v4
        with:
          name: hived-${{ matrix.target }}
          path: dist/hived-${{ matrix.target }}*

  build-rust:
    name: Build Rust (${{ matrix.crate }})
    runs-on: [self-hosted, Linux, X64, unified-all]
    strategy:
      matrix:
        crate: [cli, tui]
        include:
          - crate: cli
            binary: hive
          - crate: tui
            binary: hivetop
    steps:
      - uses: actions/checkout@v4

      - name: Build release
        run: cd ${{ matrix.crate }} && cargo build --release

      - name: Package
        run: |
          mkdir -p dist
          cp ${{ matrix.crate }}/target/release/${{ matrix.binary }} dist/${{ matrix.binary }}-linux-amd64

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}-linux-amd64
          path: dist/${{ matrix.binary }}-linux-amd64

  release:
    name: Create GitHub Release
    needs: [build-daemon, build-rust]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.sha256

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Hive ${{ github.ref_name }}" \
            --generate-notes \
            dist/*
