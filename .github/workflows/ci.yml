name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_HOME: ${{ github.workspace }}/.cargo
  GOPATH: ${{ github.workspace }}/.go

jobs:
  guard:
    name: Repo Guard
    uses: ./.github/workflows/repo-guard.yml

  daemon:
    name: Daemon (Go)
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Vet
        run: cd daemon && go vet ./...

      - name: Test
        run: cd daemon && go test -race -count=1 ./...

      - name: Vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd daemon && govulncheck ./...
        continue-on-error: true

      - name: Build
        run: cd daemon && CGO_ENABLED=0 go build -o ../dist/hived ./cmd/hived

  cli:
    name: CLI (Rust)
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - name: Format check
        run: cd cli && cargo fmt --check

      - name: Clippy
        run: cd cli && cargo clippy -- -D warnings

      - name: Test
        run: cd cli && cargo test

      - name: Security audit
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cd cli && cargo audit
        continue-on-error: true

      - name: Build
        run: cd cli && cargo build --release

  tui:
    name: TUI (Rust)
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - name: Format check
        run: cd tui && cargo fmt --check

      - name: Clippy
        run: cd tui && cargo clippy -- -D warnings

      - name: Test
        run: cd tui && cargo test

      - name: Security audit
        run: |
          cargo install cargo-audit 2>/dev/null || true
          cd tui && cargo audit
        continue-on-error: true

      - name: Build
        run: cd tui && cargo build --release

  proto-check:
    name: Proto sync check
    needs: [guard]
    runs-on: [self-hosted, Linux, X64, unified-all]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Install protoc
        run: |
          if command -v apt-get >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq protobuf-compiler
          elif command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y -q protobuf-compiler
          else
            echo "ERROR: No supported package manager found" && exit 1
          fi

      - name: Install protoc plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest

      - name: Regenerate and diff
        run: |
          make proto
          git diff --exit-code daemon/internal/api/gen/ || {
            echo "ERROR: Generated proto code is out of sync. Run 'make proto' and commit."
            exit 1
          }
