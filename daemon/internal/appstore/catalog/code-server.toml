[recipe]
id = "code-server"
name = "Code Server"
description = "VS Code in the browser — full IDE accessible from any device"
icon = "💻"
category = "devtools"
tags = ["ide", "vscode", "development", "remote", "linuxserver.io"]
image = "lscr.io/linuxserver/code-server:latest"
version = "latest"
min_memory = "512M"
platforms = ["linux/amd64"]

  [recipe.config.password]
  label = "Password"
  type = "secret"
  required = true
  description = "Password to access the VS Code web interface"

  [recipe.config.sudo_password]
  label = "Sudo Password"
  type = "secret"
  required = false
  description = "Optional sudo password for the container user"

[service.code-server]
image = "lscr.io/linuxserver/code-server:latest"
replicas = 1

  [service.code-server.env]
  PUID = "1000"
  PGID = "1000"
  TZ = "Etc/UTC"
  PASSWORD = "{{ config:password }}"
  SUDO_PASSWORD = "{{ config:sudo_password }}"
  DEFAULT_WORKSPACE = "/config/workspace"

  [service.code-server.health]
  type = "http"
  path = "/healthz"
  port = 8443
  interval = "30s"

  [service.code-server.ports]
  "8443" = "8443"

  [[service.code-server.volumes]]
  name = "code-server-config"
  target = "/config"

  [service.code-server.resources]
  memory = "512M"
  cpus = 1.0
