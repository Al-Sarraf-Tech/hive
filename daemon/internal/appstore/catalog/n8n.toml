[recipe]
id = "n8n"
name = "n8n"
description = "Workflow automation tool — connect anything to everything"
icon = "🔄"
category = "automation"
tags = ["workflow", "automation", "integration", "low-code"]
image = "n8nio/n8n:latest"
version = "latest"
min_memory = "256M"
platforms = ["linux/amd64"]

  [recipe.config.encryption_key]
  label = "Encryption Key"
  type = "secret"
  required = true
  description = "Key used to encrypt credentials stored by n8n"

[service.n8n]
image = "n8nio/n8n:latest"
replicas = 1

  [service.n8n.env]
  N8N_ENCRYPTION_KEY = "{{ config:encryption_key }}"
  N8N_PROTOCOL = "http"
  N8N_PORT = "5678"

  [service.n8n.health]
  type = "http"
  path = "/healthz"
  port = 5678
  interval = "30s"

  [service.n8n.ports]
  "5678" = "5678"

  [[service.n8n.volumes]]
  name = "n8n-data"
  target = "/home/node/.n8n"

  [service.n8n.resources]
  memory = "256M"
  cpus = 0.5
